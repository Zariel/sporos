[package]
name = "sporos"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Rust compatibility rebuild of cross-seed behavior"
license = "MIT"

[workspace]
members = ["."]
resolver = "3"

[workspace.lints.rust]
unsafe_code = "forbid"
warnings = "deny"

[workspace.lints.clippy]
all = "deny"

[lints]
workspace = true
