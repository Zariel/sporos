name: ci

on:
  push:
  pull_request:

jobs:
  cargo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - run: cargo fmt --check
      - run: cargo build
      - run: cargo check
      - run: cargo test
      - run: cargo clippy --all-targets --all-features -- -D warnings
