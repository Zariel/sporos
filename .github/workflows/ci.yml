name: ci

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: never

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Restore cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo build
        run: cargo build --workspace --locked

      - name: Cargo check
        run: cargo check --workspace --locked

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test --workspace --locked

  image:
    needs:
      - test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build image
        env:
          DOCKER_BUILDKIT: "1"
        run: docker build -t sporos-ci:test -f Dockerfile .

      - name: Inspect image
        run: docker image inspect sporos-ci:test

      - name: Check image entrypoint
        run: docker run --rm sporos-ci:test --help

  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - test
      - image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image name
        id: image
        run: |
          set -euo pipefail
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Resolve image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=tag

      - name: Validate publish tag contract
        env:
          RESOLVED_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          expected_tag="${GITHUB_REF_NAME//\//-}"
          mapfile -t tags < <(printf "%s\n" "$RESOLVED_TAGS" | sed '/^$/d')
          if [ "${#tags[@]}" -ne 1 ]; then
            echo "expected exactly one publish tag, got ${#tags[@]}: ${tags[*]}" >&2
            exit 1
          fi
          actual_ref="${tags[0]}"
          actual_tag="${actual_ref##*:}"
          if [ "$actual_tag" != "$expected_tag" ]; then
            echo "expected publish tag '$expected_tag' but got '$actual_tag'" >&2
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
