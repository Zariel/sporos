name: ci

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: never

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Restore cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo gates
        run: scripts/ci/cargo-gates

  image:
    needs:
      - test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build and smoke test image
        run: scripts/ci/image-smoke

  system-torrent-clients:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    needs:
      - test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0

      - name: Run real-client system test
        env:
          DOCKER_BUILDKIT: "1"
          SPOROS_SYSTEM_RUN_ROOT: ${{ runner.temp }}/sporos-system
        run: |
          set -euo pipefail
          mkdir -p "$SPOROS_SYSTEM_RUN_ROOT"
          scripts/system-test torrent-clients

      - name: Upload system diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: system-torrent-client-diagnostics
          path: ${{ runner.temp }}/sporos-system/*diagnostics*
          if-no-files-found: ignore
          retention-days: 7

  system-torrent-clients-compatibility:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    needs:
      - test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0

      - name: Run floating-client compatibility test
        env:
          DOCKER_BUILDKIT: "1"
          SPOROS_SYSTEM_RUN_ROOT: ${{ runner.temp }}/sporos-system-compatibility
          SPOROS_SYSTEM_QBITTORRENT_IMAGE: lscr.io/linuxserver/qbittorrent:latest
          SPOROS_SYSTEM_RTORRENT_IMAGE: ghcr.io/crazy-max/rtorrent-rutorrent:latest
        run: |
          set -euo pipefail
          mkdir -p "$SPOROS_SYSTEM_RUN_ROOT"
          scripts/system-test torrent-clients

      - name: Upload compatibility diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: system-torrent-client-compatibility-diagnostics
          path: ${{ runner.temp }}/sporos-system-compatibility/*diagnostics*
          if-no-files-found: ignore
          retention-days: 7

  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - test
      - image
      - system-torrent-clients
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image name
        id: image
        run: |
          set -euo pipefail
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Resolve image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=tag

      - name: Validate publish tag contract
        env:
          RESOLVED_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          expected_tag="${GITHUB_REF_NAME//\//-}"
          mapfile -t tags < <(printf "%s\n" "$RESOLVED_TAGS" | sed '/^$/d')
          if [ "${#tags[@]}" -ne 1 ]; then
            echo "expected exactly one publish tag, got ${#tags[@]}: ${tags[*]}" >&2
            exit 1
          fi
          actual_ref="${tags[0]}"
          actual_tag="${actual_ref##*:}"
          if [ "$actual_tag" != "$expected_tag" ]; then
            echo "expected publish tag '$expected_tag' but got '$actual_tag'" >&2
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-latest:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - test
      - image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image name
        id: image
        run: |
          set -euo pipefail
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Resolve image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest

      - name: Validate latest tag contract
        env:
          RESOLVED_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          mapfile -t tags < <(printf "%s\n" "$RESOLVED_TAGS" | sed '/^$/d')
          if [ "${#tags[@]}" -ne 1 ]; then
            echo "expected exactly one latest tag, got ${#tags[@]}: ${tags[*]}" >&2
            exit 1
          fi
          actual_ref="${tags[0]}"
          actual_tag="${actual_ref##*:}"
          if [ "$actual_tag" != "latest" ]; then
            echo "expected publish tag 'latest' but got '$actual_tag'" >&2
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-branch:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
    needs:
      - test
      - image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image name
        id: image
        run: |
          set -euo pipefail
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Resolve image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch

      - name: Validate branch tag contract
        env:
          RESOLVED_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          expected_tag="${GITHUB_REF_NAME//\//-}"
          mapfile -t tags < <(printf "%s\n" "$RESOLVED_TAGS" | sed '/^$/d')
          if [ "${#tags[@]}" -ne 1 ]; then
            echo "expected exactly one branch tag, got ${#tags[@]}: ${tags[*]}" >&2
            exit 1
          fi
          actual_ref="${tags[0]}"
          actual_tag="${actual_ref##*:}"
          if [ "$actual_tag" != "$expected_tag" ]; then
            echo "expected publish tag '$expected_tag' but got '$actual_tag'" >&2
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
